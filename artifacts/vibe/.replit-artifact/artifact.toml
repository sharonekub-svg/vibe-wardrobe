kind = "mobile"
previewPath = "/"
title = "Vibe"
version = "1.0.0"
id = "artifacts/vibe"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25534

[services.development]
run = "pnpm --filter @workspace/vibe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vibe", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/vibe", "run", "serve" ]

[services.env]
PORT = "25534"
BASE_PATH = "/"
